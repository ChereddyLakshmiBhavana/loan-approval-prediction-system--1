<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Loan Approval Prediction System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .form-section {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .label-with-help {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .help-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #4f46e5;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 18px;
            font-size: 12px;
            font-weight: bold;
            cursor: help;
            position: relative;
        }

        .help-icon:hover::after {
            content: attr(data-help);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 1000;
            font-weight: normal;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            display: none;
            padding: 40px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .result-status {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
        }

        .approved {
            color: #10b981;
        }

        .rejected {
            color: #ef4444;
        }

        .probability-bar {
            background: #e5e7eb;
            border-radius: 20px;
            height: 20px;
            margin: 20px 0;
            overflow: hidden;
        }

        .probability-fill {
            height: 100%;
            border-radius: 20px;
            transition: width 1s ease;
        }

        .approved-fill {
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        .rejected-fill {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }

        .probability-text {
            font-size: 1.2em;
            font-weight: 600;
            margin: 10px 0;
        }

        .confidence-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 10px;
        }

        .high-confidence {
            background: #dbeafe;
            color: #1e40af;
        }

        .medium-confidence {
            background: #fef3c7;
            color: #92400e;
        }

        .low-confidence {
            background: #fee2e2;
            color: #991b1b;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .container {
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Loan Approval Prediction</h1>
            <p>AI-Powered Loan Decision System</p>
        </div>

        <form id="loanForm" class="form-section">
            <div class="form-row">
                <div class="form-group">
                    <label for="no_of_dependents">
                        <div class="label-with-help">
                            Number of Dependents
                            <span class="help-icon" data-help="Family members who depend on you financially">?</span>
                        </div>
                    </label>
                    <input type="number" id="no_of_dependents" name="no_of_dependents" min="0" max="10" required>
                </div>
                <div class="form-group">
                    <label for="education">
                        <div class="label-with-help">
                            Education
                            <span class="help-icon" data-help="Your highest level of education">?</span>
                        </div>
                    </label>
                    <select id="education" name="education" required>
                        <option value="">Select Education</option>
                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="self_employed">
                        <div class="label-with-help">
                            Self Employed
                            <span class="help-icon" data-help="Do you run your own business?">?</span>
                        </div>
                    </label>
                    <select id="self_employed" name="self_employed" required>
                        <option value="">Select Employment Status</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="income_annum">
                        <div class="label-with-help">
                            Annual Income (₹)
                            <span class="help-icon" data-help="Your yearly earnings (no commas)">?</span>
                        </div>
                    </label>
                    <input type="number" id="income_annum" name="income_annum" min="0" step="1000" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="loan_amount">
                        <div class="label-with-help">
                            Loan Amount (₹)
                            <span class="help-icon" data-help="How much money you want to borrow">?</span>
                        </div>
                    </label>
                    <input type="number" id="loan_amount" name="loan_amount" min="0" step="1000" required>
                </div>
                <div class="form-group">
                    <label for="loan_term">
                        <div class="label-with-help">
                            Loan Term (Months)
                            <span class="help-icon" data-help="Duration to repay (60=5yr, 360=30yr)">?</span>
                        </div>
                    </label>
                    <input type="number" id="loan_term" name="loan_term" min="12" max="360" step="12" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cibil_score">
                        <div class="label-with-help">
                            CIBIL Score
                            <span class="help-icon" data-help="Credit score (300-900, higher=better)">?</span>
                        </div>
                    </label>
                    <input type="number" id="cibil_score" name="cibil_score" min="300" max="900" required>
                </div>
                <div class="form-group">
                    <label for="residential_assets_value">
                        <div class="label-with-help">
                            Residential Assets (₹)
                            <span class="help-icon" data-help="Value of house/property you own">?</span>
                        </div>
                    </label>
                    <input type="number" id="residential_assets_value" name="residential_assets_value" min="0" step="1000" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="commercial_assets_value">
                        <div class="label-with-help">
                            Commercial Assets (₹)
                            <span class="help-icon" data-help="Value of business/office property">?</span>
                        </div>
                    </label>
                    <input type="number" id="commercial_assets_value" name="commercial_assets_value" min="0" step="1000" required>
                </div>
                <div class="form-group">
                    <label for="luxury_assets_value">
                        <div class="label-with-help">
                            Luxury Assets (₹)
                            <span class="help-icon" data-help="Value of car, jewelry, electronics">?</span>
                        </div>
                    </label>
                    <input type="number" id="luxury_assets_value" name="luxury_assets_value" min="0" step="1000" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bank_asset_value">
                        <div class="label-with-help">
                            Bank Assets (₹)
                            <span class="help-icon" data-help="Money in your savings/checking accounts">?</span>
                        </div>
                    </label>
                    <input type="number" id="bank_asset_value" name="bank_asset_value" min="0" step="1000" required>
                </div>
                <div class="form-group">
                    <!-- Empty for layout -->
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                🚀 Predict Loan Approval
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <h3>Analyzing your loan application...</h3>
            <p>Our AI model is processing your data</p>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-card">
                <h2>Prediction Result</h2>
                <div class="result-status" id="resultStatus"></div>

                <div class="probability-bar">
                    <div class="probability-fill" id="probabilityFill"></div>
                </div>

                <div class="probability-text" id="probabilityText"></div>

                <div class="confidence-badge" id="confidenceBadge"></div>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="footer">
            <p>🔬 Powered by Deep Learning | 🎯 93.8% Accuracy | 🚀 Real-time Predictions</p>
        </div>
    </div>

    <script>
        // API base URL strategy:
        // 1) Allow override via ?apiBase=https://your-api-url
        // 2) Use localhost backend in local frontend development
        // 3) Use deployed Render backend for Netlify-hosted frontend
        // 4) Otherwise, same-origin fallback
        const apiBaseParam = new URLSearchParams(window.location.search).get('apiBase');
        const RENDER_API_CANDIDATES = [
            'https://loan-approval-prediction-system-1-wt4y.onrender.com',
            'https://loan-approval-backend.onrender.com'
        ];
        const isLocalFrontend = window.location.origin.includes(':3000');
        const isHostedStaticFrontend =
            window.location.hostname.endsWith('netlify.app') ||
            window.location.hostname.endsWith('vercel.app');
        let API_BASE_URL = apiBaseParam ||
            (isLocalFrontend ? 'http://localhost:5000' :
                (isHostedStaticFrontend ? RENDER_API_CANDIDATES[0] : window.location.origin));

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function resolveApiBaseUrl() {
            if (apiBaseParam || isLocalFrontend || !isHostedStaticFrontend) {
                return;
            }

            for (const candidate of RENDER_API_CANDIDATES) {
                try {
                    const response = await fetch(`${candidate}/health`, { cache: 'no-store' });
                    if (response.ok) {
                        API_BASE_URL = candidate;
                        return;
                    }
                } catch (error) {
                    // Try next candidate endpoint.
                }
            }
        }

        async function fetchPredictionWithRetry(payload) {
            const retryDelays = [0, 2500, 5000, 8000];

            for (let attempt = 0; attempt < retryDelays.length; attempt++) {
                if (retryDelays[attempt] > 0) {
                    await sleep(retryDelays[attempt]);
                }

                try {
                    const response = await fetch(`${API_BASE_URL}/predict`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        return await response.json();
                    }

                    if (attempt === retryDelays.length - 1) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                } catch (error) {
                    if (attempt === retryDelays.length - 1) {
                        throw error;
                    }
                }
            }
        }

        resolveApiBaseUrl();

        document.getElementById('loanForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const errorMessage = document.getElementById('errorMessage');

            // Show loading
            submitBtn.disabled = true;
            submitBtn.textContent = '🔄 Processing...';
            loading.style.display = 'block';
            resultSection.style.display = 'none';
            errorMessage.style.display = 'none';

            // Collect form data
            const formData = new FormData(e.target);
            const data = {};
            for (let [key, value] of formData.entries()) {
                data[key] = isNaN(value) ? value : parseFloat(value);
            }

            try {
                // Make API call
                const result = await fetchPredictionWithRetry(data);

                // Hide loading
                loading.style.display = 'none';

                // Show results
                displayResult(result);

            } catch (error) {
                console.error('Error:', error);
                loading.style.display = 'none';
                errorMessage.textContent = `❌ Error: ${error.message}. API base URL: ${API_BASE_URL}`;
                errorMessage.style.display = 'block';
            }

            // Reset button
            submitBtn.disabled = false;
            submitBtn.textContent = '🚀 Predict Loan Approval';
        });

        function displayResult(result) {
            const resultSection = document.getElementById('resultSection');
            const resultStatus = document.getElementById('resultStatus');
            const probabilityFill = document.getElementById('probabilityFill');
            const probabilityText = document.getElementById('probabilityText');
            const confidenceBadge = document.getElementById('confidenceBadge');

            const probability = result.approval_probability || 0;
            const status = result.approval_status || 'Unknown';
            const confidence = result.confidence || 'Unknown';

            // Set status
            resultStatus.textContent = status === 'Approved' ? '✅ APPROVED' : '❌ REJECTED';
            resultStatus.className = `result-status ${status.toLowerCase()}`;

            // Set probability bar
            probabilityFill.style.width = `${probability * 100}%`;
            probabilityFill.className = `probability-fill ${status.toLowerCase()}-fill`;

            // Set probability text
            probabilityText.textContent = `Approval Probability: ${(probability * 100).toFixed(1)}%`;

            // Set confidence badge
            confidenceBadge.textContent = `${confidence} Confidence`;
            confidenceBadge.className = `confidence-badge ${confidence.toLowerCase().replace(' ', '-')}-confidence`;

            // Show result section
            resultSection.style.display = 'block';

            // Scroll to results
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        // Pre-fill with example data for demo
        function loadExampleData() {
            document.getElementById('no_of_dependents').value = 1;
            document.getElementById('education').value = 'Graduate';
            document.getElementById('self_employed').value = 'No';
            document.getElementById('income_annum').value = 60000;
            document.getElementById('loan_amount').value = 150000;
            document.getElementById('loan_term').value = 360;
            document.getElementById('cibil_score').value = 780;
            document.getElementById('residential_assets_value').value = 400000;
            document.getElementById('commercial_assets_value').value = 100000;
            document.getElementById('luxury_assets_value').value = 50000;
            document.getElementById('bank_asset_value').value = 100000;
        }

        // Auto-load example data on page load
        window.addEventListener('load', loadExampleData);
    </script>
</body>
</html>
