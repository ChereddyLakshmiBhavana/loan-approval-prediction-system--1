[build]
  publish = "frontend"

[build.processing]
  skip_processing = true

[build.environment]
  # Disable all automatic dependency detection
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
