services:
  - type: web
    name: loan-approval-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: ENVIRONMENT
        value: production
      - key: DEBUG_MODE
        value: false
      - key: API_HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        value: sqlite:///app.db
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.com
